# Static serving tuned for the preview app:
# - hashed assets under /_app/immutable are cached forever
# - HTML and the service worker must always revalidate, otherwise clients
#   would keep booting old builds
# - unknown paths fall back to the SvelteKit 404 shell (adapter-static)

server {
	listen 8080;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	gzip on;
	gzip_types text/html text/css application/javascript application/json image/svg+xml application/wasm;
	gzip_min_length 1024;

	# security headers appropriate for a fully client-side app
	add_header X-Content-Type-Options nosniff always;
	add_header Referrer-Policy no-referrer always;
	add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

	location /_app/immutable/ {
		add_header Cache-Control "public, max-age=31536000, immutable";
	}

	location = /service-worker.js {
		add_header Cache-Control "no-cache";
	}

	location / {
		add_header Cache-Control "no-cache";
		try_files $uri $uri/ $uri.html /404.html;
	}
}
